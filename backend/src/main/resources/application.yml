server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:recruitment_system}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:db/schema.sql

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:RecruitmentSystemJwtSecretKeyForGraduationProject2026}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
